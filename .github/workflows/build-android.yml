name: Build Android APK

on:
  workflow_dispatch:          # run manually from Actions tab
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Java 17 (required by inventree-app BUILDING.md) ─────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter 3.41.6 (pinned from .fvmrc) ─────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      # ── 4. Python + invoke (used by the project's tasks.py) ────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install invoke
        run: pip install invoke

      # ── 5. Install Flutter dependencies ────────────────────────────────────
      - name: Install Flutter packages
        run: flutter pub get

      # ── 6. Generate translation files (required before build) ───────────────
      - name: Generate translations
        run: invoke translate
        continue-on-error: true   # non-fatal if crowdin strings already present

      # ── 7. Analyse (optional – remove to skip) ─────────────────────────────
      - name: Analyse code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 8. Build release APK ────────────────────────────────────────────────
      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      # ── 9. Upload APK artifacts ─────────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inventree-android-apks
          retention-days: 30
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
