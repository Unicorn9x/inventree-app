name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── 4. Python + invoke ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install invoke

      # ── 5. Pre-create l10n directory ──────────────────────────────────────
      # flutter pub get fails if lib/l10n/collected does not exist yet.
      # invoke translate creates it, but needs Flutter first — so we create
      # the empty directory as a bootstrap step to unblock pub get.
      - name: Create l10n collected directory
        run: mkdir -p lib/l10n/collected

      # ── 6. Install Flutter packages ───────────────────────────────────────
      - name: Install Flutter packages
        run: flutter pub get

      # ── 7. Generate translations (populates lib/l10n/collected) ──────────
      - name: Generate translations
        run: invoke translate

      # ── 8. Re-run pub get to pick up generated localizations ─────────────
      - name: Flutter pub get (post-translate)
        run: flutter pub get

      # ── 9. Analyse ────────────────────────────────────────────────────────
      - name: Analyse code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 10. Build APK ─────────────────────────────────────────────────────
      - name: Build APK (release, split per ABI)
        run: flutter build apk --release --split-per-abi

      # ── 11. Upload artifacts ──────────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: inventree-android-apks
          retention-days: 30
          path: build/app/outputs/flutter-apk/app-*-release.apk
